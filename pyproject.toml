[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "graphstore"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "scipy>=1.10",
    "lark>=1.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-benchmark>=4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
